# CCZ Larval Connectivity — Test Configuration
# Reduced parameters for fast CI/test pipeline.
# NOTE: test pipeline enters at step 02 (process_connectivity).
#       Zarr particle data are generated by tests/generate_test_data.py.
# NOTE: test domain is 0–50°E, 0–50°N (synthetic data only).

test_mode: true     # Suppress Cartopy maps; use plain matplotlib for figures.

# ── Domain ────────────────────────────────────────────────────────────────────
domain:
  lon_min: 0
  lon_max: 25
  lat_min: 0
  lat_max: 25

# ── Grid ──────────────────────────────────────────────────────────────────────
grid:
  resolution_km: 10
  crs_equal_area: "EPSG:8857"
  crs_data: "EPSG:4326"
  crs_distance: "EPSG:3338"

# ── HYCOM (not used in test pipeline — kept for schema completeness) ───────────
hycom:
  opendap_url: "https://tds.hycom.org/thredds/dodsC/GLBy0.08/expt_93.0"
  north: 50
  south: 0
  west_hycom: 0
  east_hycom: 50
  variables:
    - water_u_bottom
    - water_v_bottom

# ── Time periods ──────────────────────────────────────────────────────────────
time_periods:
  n: 4
  periods:
    - label: "Jan2019"
      start: "2019-01-01"
      end:   "2019-04-09"
    - label: "Jul2019"
      start: "2019-07-01"
      end:   "2019-09-08"
    - label: "Jan2023"
      start: "2023-01-01"
      end:   "2023-04-09"
    - label: "Jul2023"
      start: "2023-07-01"
      end:   "2023-09-08"

# ── Particle tracking ─────────────────────────────────────────────────────────
tracking:
  pps: 200                    # reduced for testing; combined across 3 PLDs × 4 periods gives
                              # ~2400 effective particle-releases per cell, well above threshold
  pld_days: [19, 35, 69]
  dt_minutes: 60
  output_dt_hours: 1
  random_seed: 42            # different from production to catch hardcoded-seed bugs
  scenarios:
    - unmined
    - mined
  smagorinsky:
    Cs: 0.1
    dx_deg: 0.01

# ── Connectivity ──────────────────────────────────────────────────────────────
connectivity:
  reciprocal_threshold: 10    # applied to counts pooled across all PLDs and periods;
                              # with pps=200 × 4 periods × 3 PLDs, adjacent-cell counts
                              # are well above this, ensuring APEI cells appear as graph
                              # terminals and Phase 2 corridor optimisation runs correctly
  min_edge_particles: 10

# ── Network analysis ──────────────────────────────────────────────────────────
network:
  community_method: "fast_greedy"

# ── ICV weights ───────────────────────────────────────────────────────────────
icv:
  weights: [0.25, 0.25, 0.25, 0.25]

# ── Shapefiles ────────────────────────────────────────────────────────────────
shapefiles:
  ccz_boundary:  "tests/data/shapefiles/ccz_boundary.shp"
  ccz_grid:      "tests/data/shapefiles/ccz_grid.shp"
  ccz_centroids: "tests/data/shapefiles/ccz_grid_centroids.csv"
  apei:          "tests/data/shapefiles/apei.shp"
  ami:           "tests/data/shapefiles/ami.shp"
  apei_label_field: "Remarks"

# ── HYCOM download output ──────────────────────────────────────────────────────
hycom_data_dir: "tests/data/hycom"

# ── Particle tracking output ───────────────────────────────────────────────────
particles_dir: "tests/data/particles"

# ── Connectivity output ────────────────────────────────────────────────────────
connectivity_dir: "tests/expected_outputs/connectivity"

# ── Network analysis output ────────────────────────────────────────────────────
network_dir: "tests/expected_outputs/network"

# ── ICV / optimisation output ─────────────────────────────────────────────────
optimisation_dir: "tests/expected_outputs/optimisation"

# ── Figures output ────────────────────────────────────────────────────────────
figures_dir: "tests/expected_outputs/figures"
figure_dpi: 150
